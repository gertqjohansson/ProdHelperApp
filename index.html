<!doctype html>
<!-- lang="en" is only the pre-JS-paint default; main.jsx awaits initI18n()
     before rendering, and initI18n() overwrites document.documentElement.lang
     with the resolved language before anything is drawn. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProdHelper</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
